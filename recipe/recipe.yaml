context:
  version: "0.144.4"

package:
  name: codex
  version: ${{ version }}

source:
  url: https://github.com/openai/codex/archive/refs/tags/rust-v${{ version }}.tar.gz
  sha256: 14c173d78f0c22da73e4ca1a205836b525e1dd9fe7db9b4ddea62214b2cc5009

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
    - cargo-auditable
    - pkg-config
    - openssl

  host:
    - if: unix
      then:
        - openssl
    - if: linux
      then:
        - libcap

tests:
  - script:
      - codex --version
  - package_contents:
      bin:
        - codex
      files:
        - etc/pixi/codex/global-ignore-conda-prefix
      strict: true

about:
  summary: Lightweight coding agent that runs in your terminal
  homepage: https://github.com/openai/codex
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - moritzwilksch
    - zelosleone
    - Hofer-Julian
    - pavelzw
