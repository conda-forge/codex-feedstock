conda_build_tool: rattler-build
github:
  branch_name: main
  tooling_branch_name: main
provider:
  linux_aarch64: azure
  osx_arm64: default
  linux_64: azure
build_platform:
  linux_aarch64: linux_64
azure:
  settings_linux:
    swapfile_size: 22GiB
  free_disk_space: true
  settings_win:
    variables:
      CONDA_BLD_PATH: C:\\bld\\
      SET_PAGEFILE: 'True'
test: native_and_emulated
conda_build:
  error_overlinking: true
conda_forge_output_validation: true
bot:
  automerge: true
